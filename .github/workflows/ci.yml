name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - "pkg/**"
      - "test/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "pkg/**"
      - "test/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  BuildAndTest:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Ensure dependencies
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Pull Containers
        run: docker compose pull

      - name: Start Containers
        run: docker compose up

      - name: Run Tests
        run: go test ./... -v

      - name: Stop Containers
        if: always()
        run: docker compose down --volumes
